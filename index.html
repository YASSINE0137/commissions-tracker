<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Commissions" />
<meta name="theme-color" content="#0f0f13" />
<title>My Commissions</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #7c6af7; --accent2: #a599ff; --green: #3ecf8e; --orange: #f5a623;
    --red: #f56342; --text: #f0eeff; --muted: #7a7a99; --radius: 14px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .header { padding: 52px 20px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; gap: 6px; padding: 12px 20px; background: var(--bg); position: sticky; top: 89px; z-index: 10; }
  .tab { flex: 1; padding: 8px 4px; border-radius: 10px; border: none; background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; }

  .content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; display: none; }
  .content.active { display: block; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
  .section-title:first-child { margin-top: 0; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px; }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.purple { color: var(--accent2); }
  .stat-note { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* CLIENTS */
  .client-subtabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .client-subtab { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid transparent; background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; }
  .client-subtab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }

  .client-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); }
  .client-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .client-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: white; flex-shrink: 0; }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-weight: 700; font-size: 15px; }
  .client-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .client-amount { text-align: right; }
  .client-amount .amount { font-weight: 800; font-size: 16px; color: var(--green); }
  .client-amount .pending { font-size: 11px; color: var(--orange); }
  .chevron { color: var(--muted); font-size: 12px; margin-left: 4px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); }

  .client-detail { border-top: 1px solid var(--border); padding: 14px 16px; display: none; }
  .client-detail.open { display: block; }

  /* PAYMENT ROW */
  .payment-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .payment-row:last-child { border-bottom: none; }
  .pay-num { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
  .pay-num.deposit { background: rgba(245,163,35,0.2); color: var(--orange); }
  .pay-info { flex: 1; min-width: 0; }
  .pay-label { font-size: 13px; font-weight: 700; }
  .pay-date { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .pay-amount { font-size: 13px; font-weight: 800; color: var(--green); margin-top: 1px; }
  .payment-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 20px; }
  .badge.sent { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge.not-sent { background: rgba(245,163,35,0.15); color: var(--orange); }
  .badge.received { background: rgba(124,106,247,0.15); color: var(--accent2); }
  .badge.not-received { background: rgba(245,99,66,0.15); color: var(--red); }
  .badge.dep { background: rgba(245,163,35,0.15); color: var(--orange); border: 1px solid rgba(245,163,35,0.3); }
  .pay-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
  .toggle-btn { padding: 5px 9px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 10px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .toggle-btn:disabled { opacity: 0.35; cursor: default; }
  .icon-row { display: flex; gap: 4px; }
  .icon-btn { width: 26px; height: 26px; border-radius: 7px; border: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .icon-btn.edit { background: rgba(124,106,247,0.15); color: var(--accent2); }
  .icon-btn.del { background: rgba(245,99,66,0.12); color: var(--red); }

  .add-payment-btn { width: 100%; padding: 10px; background: rgba(124,106,247,0.08); border: 1px dashed rgba(124,106,247,0.35); border-radius: 10px; color: var(--accent2); font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .delete-client-btn { width: 100%; padding: 10px; background: rgba(245,99,66,0.08); border: 1px solid rgba(245,99,66,0.25); border-radius: 10px; color: var(--red); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  /* FAB */
  .fab { position: fixed; bottom: 84px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(124,106,247,0.5); display: flex; align-items: center; justify-content: center; z-index: 20; transition: transform 0.15s; }
  .fab:active { transform: scale(0.93); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 50; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 40px; transform: translateY(30px); transition: transform 0.25s; max-height: 92vh; overflow-y: auto; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input, select { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-family: var(--font); outline: none; -webkit-appearance: none; appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* PAYMENT BUILDER */
  .pay-builder { margin-bottom: 14px; }
  .pay-builder-row { background: var(--surface2); border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); position: relative; }
  .pay-builder-row .row-title { font-size: 12px; font-weight: 700; color: var(--accent2); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .pay-builder-row .remove-pay { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .add-row-btn { width: 100%; padding: 10px; background: rgba(62,207,142,0.08); border: 1px dashed rgba(62,207,142,0.35); border-radius: 10px; color: var(--green); font-size: 13px; font-weight: 700; cursor: pointer; }

  .submit-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--accent); border: none; color: white; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
  .submit-btn:active { opacity: 0.85; }
  .cancel-btn { width: 100%; padding: 13px; border-radius: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  /* CALENDAR */
  .cal-view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .cal-view-btn { flex: 1; padding: 7px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; }
  .cal-view-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 17px; font-weight: 800; }
  .cal-nav { background: var(--surface2); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .cal-day-label { text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); padding: 4px 0; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: 600; position: relative; cursor: pointer; }
  .cal-day.today { background: var(--accent); color: white; }
  .cal-day.has-payment { background: rgba(62,207,142,0.2); color: var(--green); }
  .cal-day.has-payment.today { background: var(--green); color: white; }
  .cal-day.other-month { color: var(--border); pointer-events: none; }
  .cal-day.selected { outline: 2px solid var(--accent2); outline-offset: 1px; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); position: absolute; bottom: 3px; }
  .week-day-row { background: var(--surface); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
  .week-day-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .week-day-num { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  .week-day-num.today { background: var(--accent); color: white; }
  .week-day-name { font-size: 13px; font-weight: 700; color: var(--muted); }
  .week-day-empty { padding: 10px 14px; font-size: 12px; color: var(--border); }
  .day-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .day-title { font-size: 16px; font-weight: 800; text-align: center; flex: 1; }
  .day-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

  .pli { background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
  .pli-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .pli-dot.pending { background: var(--orange); }
  .pli-info { flex: 1; }
  .pli-name { font-weight: 700; font-size: 14px; }
  .pli-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pli-amount { font-weight: 800; font-size: 15px; color: var(--green); white-space: nowrap; }

  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--muted); }

  /* TOAST */
  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 10px 22px; border-radius: 30px; font-weight: 700; font-size: 14px; z-index: 200; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>My <span>Commissions</span></h1>
  <div class="header-sub">Track every payment. Never miss a cent.</div>
</div>
<input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)" />
<div class="tabs">
  <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="switchTab('clients')">Clients</button>
  <button class="tab" onclick="switchTab('calendar')">Calendar</button>
</div>

<!-- DASHBOARD -->
<div class="content active" id="content-dashboard">
  <div id="stats-container"></div>
  <div class="section-title">Upcoming Payments</div>
  <div id="upcoming-container"></div>
</div>

<!-- CLIENTS -->
<div class="content" id="content-clients">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
    <button class="client-subtab active" id="subtab-active" onclick="switchClientTab('active')" style="margin-bottom:0;">⏳ In Progress</button>
    <button class="client-subtab" id="subtab-done" onclick="switchClientTab('done')" style="margin-bottom:0;">✅ Completed</button>
    <button onclick="openDataDrawer()" style="width:38px;height:38px;flex-shrink:0;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">⋮</button>
  </div>
  <div id="clients-container"></div>
</div>

<!-- DATA DRAWER -->
<div id="drawer-overlay" onclick="closeDataDrawer()" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40;opacity:0;pointer-events:none;transition:opacity 0.25s;"></div>
<div id="data-drawer" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 44px;z-index:45;transition:transform 0.3s;border-top:1px solid var(--border);">
  <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;"></div>
  <div style="font-size:16px;font-weight:800;margin-bottom:20px;">Data</div>
  <button onclick="exportData()" style="width:100%;padding:15px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;text-align:left;margin-bottom:10px;">⬆️ Export  <span style="font-size:12px;color:var(--muted);font-weight:500;float:right;margin-top:2px;">Save backup file</span></button>
  <button onclick="document.getElementById('import-input').click();closeDataDrawer();" style="width:100%;padding:15px;border-radius:12px;background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.3);color:var(--accent2);font-size:15px;font-weight:700;cursor:pointer;text-align:left;">⬇️ Import  <span style="font-size:12px;color:var(--muted);font-weight:500;float:right;margin-top:2px;">Load from file</span></button>
</div>

<!-- CALENDAR -->
<div class="content" id="content-calendar">
  <div class="cal-view-toggle">
    <button class="cal-view-btn active" id="view-month" onclick="setCalView('month')">Month</button>
    <button class="cal-view-btn" id="view-week" onclick="setCalView('week')">Week</button>
    <button class="cal-view-btn" id="view-day" onclick="setCalView('day')">Day</button>
  </div>
  <div id="cal-inner"></div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Client</div>
    <div class="form-group">
      <label>Client Name</label>
      <input type="text" id="f-name" placeholder="e.g. Sarah Johnson" />
    </div>

    <div class="divider"></div>
    <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:12px;">💳 Payments</div>
    <div class="pay-builder" id="pay-builder"></div>
    <button class="add-row-btn" onclick="addPaymentRow()">+ Add Another Payment</button>

    <button class="submit-btn" onclick="addClient()" style="margin-top:20px;">Add Client ✓</button>
    <button class="cancel-btn" onclick="closeModal('add-modal')">Cancel</button>
  </div>
</div>

<!-- EDIT PAYMENT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Payment</div>
    <div class="form-group">
      <label>Label</label>
      <input type="text" id="ep-label" placeholder="e.g. Deposit, Month 1..." />
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>Currency</label>
        <select id="ep-currency">
          <option value="$">$ USD</option>
          <option value="£">£ GBP</option>
          <option value="€">€ EUR</option>
          <option value="CAD$">CAD$</option>
          <option value="AUD$">AUD$</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="ep-amount" placeholder="e.g. 50" />
      </div>
    </div>
    <div class="form-group">
      <label>Payment Date</label>
      <input type="date" id="ep-date" />
    </div>
    <div class="form-group">
      <label>Bonus <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;">(optional — e.g. £7 or £18)</span></label>
      <div style="display:flex;gap:8px;">
        <select id="ep-bonus-currency" style="width:110px;flex-shrink:0;">
          <option value="$">$ USD</option>
          <option value="£">£ GBP</option>
          <option value="€">€ EUR</option>
          <option value="CAD$">CAD$</option>
          <option value="AUD$">AUD$</option>
        </select>
        <input type="number" id="ep-bonus" placeholder="0 = no bonus" style="flex:1;" />
      </div>
    </div>
    <button class="submit-btn" onclick="saveEditPayment()">Save Changes ✓</button>
    <button class="cancel-btn" onclick="closeModal('edit-modal')">Cancel</button>
  </div>
</div>

<!-- ADD PAYMENT TO EXISTING CLIENT -->
<div class="modal-overlay" id="addpay-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Payment</div>
    <div class="form-group">
      <label>Label</label>
      <input type="text" id="ap-label" placeholder="e.g. Month 3, Bonus..." />
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>Currency</label>
        <select id="ap-currency">
          <option value="$">$ USD</option>
          <option value="£">£ GBP</option>
          <option value="€">€ EUR</option>
          <option value="CAD$">CAD$</option>
          <option value="AUD$">AUD$</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="ap-amount" placeholder="e.g. 50" />
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="ap-date" />
    </div>
    <div class="form-group">
      <label>Bonus <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;">(optional)</span></label>
      <div style="display:flex;gap:8px;">
        <select id="ap-bonus-currency" style="width:110px;flex-shrink:0;">
          <option value="$">$ USD</option>
          <option value="£">£ GBP</option>
          <option value="€">€ EUR</option>
          <option value="CAD$">CAD$</option>
          <option value="AUD$">AUD$</option>
        </select>
        <input type="number" id="ap-bonus" placeholder="0 = no bonus" style="flex:1;" />
      </div>
    </div>
    <button class="submit-btn" onclick="saveAddPayment()">Add Payment ✓</button>
    <button class="cancel-btn" onclick="closeModal('addpay-modal')">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CURRENCIES ──────────────────────────────────────────
const CURRENCIES = ['$','£','€','CAD$','AUD$'];
const CURRENCY_LABELS = { '$':'$ USD','£':'£ GBP','€':'€ EUR','CAD$':'CAD$','AUD$':'AUD$' };

// ─── STATE ───────────────────────────────────────────────
let clients = JSON.parse(localStorage.getItem('commission_clients_v2') || '[]');
let calView = 'month';
let calYear, calMonth, calWeekStart, calDayDate;
let selectedCalDay = null;
let clientFilter = 'active';
let editTarget = null;
let addPayTarget = null;
let payRowCount = 0;

// ─── FX RATES ─────────────────────────────────────────────
// Cached rates: how much 1 unit of key = in USD
let fxRates = JSON.parse(localStorage.getItem('fx_rates') || 'null');
let fxLastFetch = parseInt(localStorage.getItem('fx_last_fetch') || '0');

async function ensureFxRates() {
  const now = Date.now();
  // refresh if no rates or older than 4 hours
  if (fxRates && (now - fxLastFetch) < 4 * 60 * 60 * 1000) return;
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await res.json();
    // data.rates gives us: 1 USD = X currency
    // we want: 1 currency = Y USD, so invert
    fxRates = {};
    for (const [cur, rate] of Object.entries(data.rates)) {
      fxRates[cur] = 1 / rate; // value in USD
    }
    fxRates['$'] = 1;
    localStorage.setItem('fx_rates', JSON.stringify(fxRates));
    localStorage.setItem('fx_last_fetch', String(now));
    fxLastFetch = now;
  } catch(e) {
    // fallback hardcoded rates if offline
    if (!fxRates) fxRates = { '$':1, '£':1.27, '€':1.08, 'CAD$':0.74, 'AUD$':0.65 };
  }
}

// Convert an amount from one currency to another
// Returns null if rates not available
function convertCurrency(amount, fromCur, toCur) {
  if (fromCur === toCur) return amount;
  if (!fxRates) return null;
  // map our symbols to ISO codes
  const iso = { '$':'USD', '£':'GBP', '€':'EUR', 'CAD$':'CAD', 'AUD$':'AUD' };
  const from = iso[fromCur] || fromCur;
  const to = iso[toCur] || toCur;
  const fromUSD = fxRates[from] || 1;
  const toUSD = fxRates[to] || 1;
  // from -> USD -> to
  return amount * fromUSD / toUSD;
}

// Get bonus amount in the payment's main currency
function bonusInMainCurrency(p) {
  if (!p.bonus || p.bonus <= 0) return 0;
  const bonusCur = p.bonusCurrency || '£';
  const mainCur = p.currency || '$';
  if (bonusCur === mainCur) return p.bonus;
  const converted = convertCurrency(p.bonus, bonusCur, mainCur);
  return converted !== null ? converted : p.bonus;
}

// Convert full payment value (commission + bonus) to USD
function paymentToUSD(p) {
  const mainCur = p.currency || '$';
  const commUSD = convertCurrency(p.amount, mainCur, '$') ?? p.amount;
  const bonusUSD = p.bonus && p.bonus > 0
    ? (convertCurrency(p.bonus, p.bonusCurrency || '£', '$') ?? p.bonus)
    : 0;
  return { commUSD, bonusUSD };
}

function toDateStr(d) { return d.toISOString().split('T')[0]; }
function addMonths(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split('T')[0];
}
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateShort(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function fmtAmt(p) {
  const mainCur = p.currency || '$';
  let s = mainCur + parseFloat(p.amount).toFixed(2);
  if (p.bonus && p.bonus > 0) {
    const bonusCur = p.bonusCurrency || '£';
    const bonusConverted = bonusInMainCurrency(p);
    const sameC = bonusCur === mainCur;
    // show original if different currency, converted in parens
    const bonusLabel = sameC
      ? mainCur + p.bonus.toFixed(2)
      : bonusCur + p.bonus.toFixed(2) + '≈' + mainCur + bonusConverted.toFixed(2);
    s += '<span style="font-size:10px;color:var(--orange);font-weight:600;margin-left:5px;opacity:0.9;">+' + bonusLabel + ' bonus</span>';
  }
  return s;
}
function totalAmt(p) {
  // commission + bonus if bonus received
  return p.amount + (p.bonus && p.bonusReceived ? p.bonus : 0);
}
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function avatarColor(name) {
  const c = ['#7c6af7','#3ecf8e','#f5a623','#f56342','#5bc4f5','#e059a8'];
  let h = 0; for (let ch of name) h = (h*31 + ch.charCodeAt(0)) % c.length;
  return c[h];
}
function isClientDone(c) { return c.payments.length > 0 && c.payments.every(p => p.receivedByMe); }
function isOverdue(dateStr) { return new Date(dateStr+'T00:00:00') < new Date(today.toDateString()); }

// ─── ADD CLIENT ───────────────────────────────────────────
function addClient() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Enter client name!'); return; }

  const rows = document.querySelectorAll('#pay-builder .pay-builder-row');
  if (rows.length === 0) { showToast('Add at least one payment!'); return; }

  const payments = [];
  for (const row of rows) {
    const id = row.id.replace('prow-','');
    const label = document.getElementById('prow-label-'+id).value.trim() || 'Payment';
    const currency = document.getElementById('prow-currency-'+id).value;
    const amount = parseFloat(document.getElementById('prow-amount-'+id).value);
    const date = document.getElementById('prow-date-'+id).value;
    if (!amount || !date) { showToast('Fill in all payment fields!'); return; }
    const bonusRaw = parseFloat(document.getElementById('prow-bonus-'+id).value);
    const bonus = isNaN(bonusRaw) || bonusRaw <= 0 ? 0 : bonusRaw;
    const bonusCurrency = document.getElementById('prow-bonus-currency-'+id).value;
    payments.push({ id: Date.now()+payments.length, label, currency, amount, date, bonus, bonusCurrency, sentToCoach: false, receivedByMe: false, bonusReceived: false });
  }

  clients.push({ id: Date.now(), name, payments });
  save();
  closeModal('add-modal');
  showToast('Client added! 🎉');
  renderDashboard();
}

// ─── TOGGLE ───────────────────────────────────────────────
function togglePayment(ci, pi, field) {
  const p = clients[ci].payments[pi];
  if (field === 'sent') {
    p.sentToCoach = !p.sentToCoach;
    if (!p.sentToCoach) { p.receivedByMe = false; p.bonusReceived = false; }
  } else if (field === 'received') {
    p.receivedByMe = !p.receivedByMe;
    if (!p.receivedByMe) p.bonusReceived = false;
  } else if (field === 'bonus') {
    p.bonusReceived = !p.bonusReceived;
  }
  save(); renderClients(); applyOpenCards(); renderDashboard();
  showToast('Updated ✓');
}

// ─── DASHBOARD ───────────────────────────────────────────
function renderDashboard() {
  // All totals converted to USD
  let usdEarned = 0, usdReceived = 0, usdPending = 0;
  const upcoming = [];
  clients.forEach(c => {
    c.payments.forEach(p => {
      const { commUSD, bonusUSD } = paymentToUSD(p);
      usdEarned += commUSD + bonusUSD;
      if (p.receivedByMe) {
        usdReceived += commUSD + (p.bonusReceived ? bonusUSD : 0);
        if (bonusUSD > 0 && !p.bonusReceived) usdPending += bonusUSD;
      } else {
        usdPending += commUSD + bonusUSD;
        upcoming.push({ clientName: c.name, payment: p });
      }
    });
  });
  upcoming.sort((a,b) => a.payment.date.localeCompare(b.payment.date));

  const hasClients = clients.length > 0 && clients.some(c => c.payments.length > 0);
  const statsHtml = `<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-value purple">${hasClients ? '$'+usdEarned.toFixed(2) : '—'}</div></div>
    <div class="stat-card"><div class="stat-label">Received</div><div class="stat-value green">${hasClients ? '$'+usdReceived.toFixed(2) : '—'}</div></div>
    <div class="stat-card full"><div class="stat-label">Still Pending</div><div class="stat-value orange">${hasClients ? '$'+usdPending.toFixed(2) : '—'}</div></div>
  </div>`;

  document.getElementById('stats-container').innerHTML = statsHtml;

  const upEl = document.getElementById('upcoming-container');
  if (upcoming.length === 0) {
    upEl.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">All caught up!</div><div class="empty-sub">No pending payments.</div></div>`;
    return;
  }
  upEl.innerHTML = upcoming.slice(0,10).map(u => `
    <div class="pli">
      <div class="pli-dot pending"></div>
      <div class="pli-info">
        <div class="pli-name">${u.clientName} · ${u.payment.label||'Payment'}</div>
        <div class="pli-sub">${fmtDate(u.payment.date)}${isOverdue(u.payment.date) ? ' ⚠️ Overdue' : ''}</div>
        <div class="payment-badges" style="margin-top:4px;">
          <span class="badge ${u.payment.sentToCoach?'sent':'not-sent'}">${u.payment.sentToCoach?'✓ Coach received':'⏳ Coach pending'}</span>
          <span class="badge ${u.payment.receivedByMe?'received':'not-received'}">${u.payment.receivedByMe?'✓ I got it':'⏳ Not received'}</span>
        </div>
      </div>
      <div class="pli-amount">${fmtAmt(u.payment)}</div>
    </div>`).join('');
}

// ─── CLIENTS ─────────────────────────────────────────────
function renderClients() {
  const el = document.getElementById('clients-container');
  if (clients.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No clients yet</div><div class="empty-sub">Tap + to add your first client</div></div>`;
    return;
  }
  const filtered = clients.filter(c => clientFilter==='done' ? isClientDone(c) : !isClientDone(c));
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">${clientFilter==='done'?'✅':'⏳'}</div><div class="empty-title">${clientFilter==='done'?'No completed clients yet':'All clients completed!'}</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(c => {
    const ci = clients.indexOf(c);
    // All client totals in USD
    const clientUSD = c.payments.reduce((acc,p) => {
      const { commUSD, bonusUSD } = paymentToUSD(p);
      acc.earned += commUSD + bonusUSD;
      if (p.receivedByMe) {
        acc.received += commUSD + (p.bonusReceived ? bonusUSD : 0);
        if (bonusUSD > 0 && !p.bonusReceived) acc.pending += bonusUSD;
      } else {
        acc.pending += commUSD + bonusUSD;
      }
      return acc;
    }, { earned:0, received:0, pending:0 });
    const color = avatarColor(c.name);
    return `
    <div class="client-card">
      <div class="client-header" onclick="toggleClient(${ci})">
        <div class="client-avatar" style="background:${color}">${initials(c.name)}</div>
        <div class="client-info">
          <div class="client-name">${c.name}</div>
          <div class="client-meta">${c.payments.length} payment${c.payments.length!==1?'s':''}</div>
        </div>
        <div class="client-amount">
          <div class="amount">$${clientUSD.received.toFixed(2)}</div>
          ${clientUSD.pending > 0 ? `<div class="pending">$${clientUSD.pending.toFixed(2)} due</div>` : '<div style="font-size:11px;color:var(--green)">✓ Done</div>'}
        </div>
        <div class="chevron" id="chevron-${ci}">›</div>
      </div>
      <div class="client-detail" id="detail-${ci}">
        ${c.payments.map((p,pi) => `
          <div class="payment-row">
            <div class="pay-num">${pi+1}</div>
            <div class="pay-info">
              <div class="pay-label">${p.label||'Payment'}</div>
              <div class="pay-date">${fmtDate(p.date)}</div>
              <div class="pay-amount">${fmtAmt(p)}</div>
              <div class="payment-badges">
                <span class="badge ${p.sentToCoach?'sent':'not-sent'}">${p.sentToCoach?'✓ Coach':'⏳ Coach'}</span>
                <span class="badge ${p.receivedByMe?'received':'not-received'}">${p.receivedByMe?'✓ Got it':'⏳ Waiting'}</span>
                ${p.bonus && p.bonus > 0 ? `<span class="badge ${p.bonusReceived?'received':'not-received'}">${p.bonusReceived?'✓ Bonus got':'⏳ Bonus pending'}</span>` : ''}
              </div>
            </div>
            <div class="pay-actions">
              <button class="toggle-btn" onclick="togglePayment(${ci},${pi},'sent')">${p.sentToCoach?'Undo sent':'Mark sent'}</button>
              <button class="toggle-btn" onclick="togglePayment(${ci},${pi},'received')" ${!p.sentToCoach?'disabled':''}>${p.receivedByMe?'Undo':'Got it!'}</button>
              ${p.bonus && p.bonus > 0 ? `<button class="toggle-btn" style="background:rgba(245,163,35,0.12);border-color:rgba(245,163,35,0.3);color:var(--orange);" onclick="togglePayment(${ci},${pi},'bonus')" ${!p.receivedByMe?'disabled':''}>${p.bonusReceived?'Undo bonus':'Got bonus!'}</button>` : ''}
              <div class="icon-row">
                <button class="icon-btn edit" onclick="openEditPayment(${ci},${pi})">✏️</button>
                <button class="icon-btn del" onclick="deletePayment(${ci},${pi})">🗑</button>
              </div>
            </div>
          </div>`).join('')}

}

// Build a totals summary bar from an array of payment entries
function totalBarHTML(entries, label) {
  if (entries.length === 0) return '';
  // group by currency
  const totals = {}; // cur -> { total, received, pending }
  // All calendar totals in USD
  entries.forEach(e => {
    const p = e.payment;
    const { commUSD, bonusUSD } = paymentToUSD(p);
    if (!totals['$']) totals['$'] = { total:0, received:0, pending:0 };
    totals['$'].total += commUSD + bonusUSD;
    if (p.receivedByMe) {
      totals['$'].received += commUSD + (p.bonusReceived ? bonusUSD : 0);
      if (bonusUSD > 0 && !p.bonusReceived) totals['$'].pending += bonusUSD;
    } else {
      totals['$'].pending += commUSD + bonusUSD;
    }
  });
  const t = totals['$'] || { total:0, received:0, pending:0 };
  const blocks = `<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
    <div><div style="font-size:10px;color:var(--muted);font-weight:600;">TOTAL</div><div style="font-size:16px;font-weight:800;color:var(--accent2);">$${t.total.toFixed(2)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);font-weight:600;">RECEIVED</div><div style="font-size:16px;font-weight:800;color:var(--green);">$${t.received.toFixed(2)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);font-weight:600;">PENDING</div><div style="font-size:16px;font-weight:800;color:var(--orange);">$${t.pending.toFixed(2)}</div></div>
  </div>`;
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;">${blocks}</div>`;
}

function buildMonthView() {
  const map=getPaymentMap();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  let cells=DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  for(let i=firstDay-1;i>=0;i--) cells+=`<div class="cal-day other-month">${prevDays-i}</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const hasP=map[ds];
    let cls='cal-day'+(isT?' today':'')+(hasP?' has-payment':'')+(selectedCalDay===ds?' selected':'');
    cells+=`<div class="${cls}" onclick="selectCalDay('${ds}')">${d}${hasP?'<div class="cal-dot"></div>':''}</div>`;
  }
  const rem=42-firstDay-daysInMonth;
  for(let d=1;d<=rem;d++) cells+=`<div class="cal-day other-month">${d}</div>`;
  const entries=selectedCalDay?(map[selectedCalDay]||[]):Object.entries(map).filter(([k])=>k.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)).flatMap(([,v])=>v).sort((a,b)=>a.payment.date.localeCompare(b.payment.date));
  const periodLabel = selectedCalDay ? 'Payments on '+fmtDate(selectedCalDay) : 'All payments this month';
  return `<div class="cal-header"><button class="cal-nav" onclick="prevCal()">‹</button><div class="cal-month">${MONTHS[calMonth]} ${calYear}</div><button class="cal-nav" onclick="nextCal()">›</button></div>
    <div class="calendar-grid" style="margin-bottom:4px;">${cells}</div>
    <div class="section-title" style="margin-top:16px;">${periodLabel}</div>
    ${totalBarHTML(entries)}
    ${entries.length===0?'<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px;">No payments</div>':pliHTML(entries)}`;
}
function selectCalDay(ds){ selectedCalDay=selectedCalDay===ds?null:ds; renderCalendar(); }

function buildWeekView() {
  const map=getPaymentMap();
  const ws=new Date(calWeekStart);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const label=ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+we.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  // collect all entries for the week for the total bar
  const allWeekEntries=[];
  let rows='';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const ds=toDateStr(d);
    const isT=ds===toDateStr(today);
    const entries=map[ds]||[];
    entries.forEach(e=>allWeekEntries.push(e));
    rows+=`<div class="week-day-row">
      <div class="week-day-header"><div class="week-day-num ${isT?'today':''}">${d.getDate()}</div><div class="week-day-name">${DAYS[d.getDay()]}${isT?' · Today':''}</div></div>
      ${entries.length>0?pliHTML(entries):'<div class="week-day-empty">No payments</div>'}
    </div>`;
  }
  return `<div class="cal-header"><button class="cal-nav" onclick="prevCal()">‹</button><div class="cal-month" style="font-size:14px;">${label}</div><button class="cal-nav" onclick="nextCal()">›</button></div>
    <div class="section-title">This week</div>
    ${totalBarHTML(allWeekEntries)}
    ${rows}`;
}

function buildDayView() {
  const map=getPaymentMap();
  const ds=toDateStr(calDayDate);
  const entries=map[ds]||[];
  const isT=ds===toDateStr(today);
  return `<div class="day-nav"><button class="cal-nav" onclick="prevCal()">‹</button><div class="day-title">${fmtDateShort(calDayDate)}${isT?' · Today':''}</div><button class="cal-nav" onclick="nextCal()">›</button></div>
    ${totalBarHTML(entries)}
    ${entries.length>0?pliHTML(entries):'<div class="day-empty">No payments on this day</div>'}`;
}

function prevCal(){
  if(calView==='month'){calMonth--;if(calMonth<0){calMonth=11;calYear--;}selectedCalDay=null;}
  else if(calView==='week'){calWeekStart.setDate(calWeekStart.getDate()-7);}
  else{calDayDate.setDate(calDayDate.getDate()-1);}
  renderCalendar();
}
function nextCal(){
  if(calView==='month'){calMonth++;if(calMonth>11){calMonth=0;calYear++;}selectedCalDay=null;}
  else if(calView==='week'){calWeekStart.setDate(calWeekStart.getDate()+7);}
  else{calDayDate.setDate(calDayDate.getDate()+1);}
  renderCalendar();
}

// ─── TOAST ────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  if(toastTimer) clearTimeout(toastTimer);
  t.textContent=msg; t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── NOTIFICATIONS ────────────────────────────────────────
function scheduleReminders(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') Notification.requestPermission();
}
function checkTodayReminders(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const ts=toDateStr(today);
  clients.forEach(c=>c.payments.forEach(p=>{
    if(p.date===ts&&!p.receivedByMe) new Notification('💰 Payment Due Today',{body:`${c.name} · ${p.label||'Payment'} — ${fmtAmt(p)}`});
  }));
}

// ─── DATA DRAWER ─────────────────────────────────────────
function openDataDrawer() {
  document.getElementById('data-drawer').style.transform = 'translateX(-50%) translateY(0)';
  const ov = document.getElementById('drawer-overlay');
  ov.style.opacity = '1'; ov.style.pointerEvents = 'all';
}
function closeDataDrawer() {
  document.getElementById('data-drawer').style.transform = 'translateX(-50%) translateY(100%)';
  const ov = document.getElementById('drawer-overlay');
  ov.style.opacity = '0'; ov.style.pointerEvents = 'none';
}

// ─── EXPORT / IMPORT ─────────────────────────────────────
function exportData() {
  if (clients.length === 0) { showToast('Nothing to export yet!'); return; }
  const data = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), clients }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'commissions-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported! 📁 Save that file.');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      const incoming = parsed.clients || parsed; // support both formats
      if (!Array.isArray(incoming)) { showToast('Invalid file ❌'); return; }
      const existingIds = new Set(clients.map(c => c.id));
      let added = 0, skipped = 0;
      incoming.forEach(c => {
        if (existingIds.has(c.id)) { skipped++; }
        else { clients.push(c); added++; }
      });
      save();
      renderDashboard();
      renderClients();
      showToast(`Imported ${added} client${added!==1?'s':''}${skipped?' ('+skipped+' already existed)':''}  ✅`);
    } catch(err) {
      showToast('Could not read file ❌');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─── INIT ─────────────────────────────────────────────────
ensureFxRates().then(() => {
  renderDashboard();
  renderClients();
});
renderDashboard();
scheduleReminders();
setTimeout(checkTodayReminders,1500);
</script>
